name: My First Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:     # Yeh button se manually run karne ke liye

jobs:
  hello:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Hello from GitHub Actions
        run: echo "Hello Moiz! 🎉 Mera pehla GitHub Action workflow successfully run ho raha hai!"

      - name: Print current date and time
        run: date

      - name: Show who triggered it
        run: echo "Triggered by: ${{ github.actor }}"

      - name: Show repository name
        run: echo "Repository: ${{ github.repository }}"
